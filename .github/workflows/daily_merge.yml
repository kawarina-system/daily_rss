name: Daily RSS Merge

on:
  schedule:
    # 毎日19:00 JST (UTCでは10:00) に実行
    - cron: '0 10 * * *'
  workflow_dispatch: # 手動で実行ボタンを押せるようにする設定

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み権限を許可

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run merge script
        run: python merge_rss.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *integrated_support.xml
          # 変更がある場合のみコミットしてプッシュ
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "Update RSS data: $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes to commit"
          fi